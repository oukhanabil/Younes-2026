<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SGA - Système de Gestion des Agents</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#34495e"/>
    <link rel="apple-touch-icon" href="icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="app-container">

        <header class="app-header">
            <h1>SYSTÈME DE GESTION DES AGENTS</h1>
            <p id="sub-title">Menu Principal</p>
        </header>

        <main id="main-content">
            <!-- Contenu dynamique -->
            <div style="text-align: center; padding: 20px;">
                <p>Chargement de l'application...</p>
            </div>
        </main>

        <div id="overlay" class="overlay">
            <div id="popup-content" class="popup-content">
                <!-- Contenu des popups -->
            </div>
        </div>

        <!-- Snackbar pour les messages -->
        <div id="snackbar" style="display:none;"></div>

    </div>

    <!-- IMPORTANT: data.js DOIT être chargé AVANT app.js -->
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // Vérification que les données sont chargées
        window.addEventListener('DOMContentLoaded', function() {
            if (typeof agents !== 'undefined') {
                console.log(`✅ ${agents.length} agents chargés depuis data.js`);
            } else {
                console.error("❌ data.js n'a pas chargé correctement");
                // Afficher un message d'erreur à l'utilisateur
                const mainContent = document.getElementById('main-content');
                if (mainContent) {
                    mainContent.innerHTML = `
                        <div style="text-align: center; padding: 40px; background: #e74c3c; border-radius: 10px; margin: 20px;">
                            <h3>❌ Erreur de chargement</h3>
                            <p>Le fichier data.js n'a pas pu être chargé.</p>
                            <p>Veuillez vérifier que le fichier existe et réessayer.</p>
                            <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px;">Recharger</button>
                        </div>
                    `;
                }
            }
        });
    </script>
</body>
</html>
