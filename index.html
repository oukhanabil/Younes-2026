<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Système de Gestion des Agents</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: #2c3e50;
            color: white;
        }
        #app-container {
            max-width: 600px;
            margin: 0 auto;
            background: #2c3e50;
            min-height: 100vh;
        }
        .app-header {
            background: #34495e;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
        }
        .app-header h1 {
            margin: 0;
            font-size: 1.4em;
        }
        .app-header p {
            margin: 5px 0 0;
            font-size: 0.9em;
            color: #bdc3c7;
        }
        #main-content {
            padding: 15px;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        #popup-content {
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <header class="app-header">
            <h1>SYSTÈME DE GESTION DES AGENTS</h1>
            <p id="sub-title">Menu Principal</p>
        </header>
        <main id="main-content">
            <div style="text-align: center; padding: 20px;">Chargement...</div>
        </main>
        <div id="overlay" class="overlay">
            <div id="popup-content"></div>
        </div>
        <div id="snackbar"></div>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
